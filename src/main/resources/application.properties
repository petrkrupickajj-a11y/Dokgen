# H2 databaze ulozena v souboru ./data/dokgen.mv.db - data ti tedy zustanou
# zachovana i po restartu aplikace. Kdybys chtel databazi jen v pameti
# (smaze se pri kazdem restartu), zmen radek na: spring.datasource.url=jdbc:h2:mem:dokgen
spring.datasource.url=jdbc:h2:file:./data/dokgen
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate si sam podle entit vytvori/aktualizuje tabulky
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Webova konzole pro nahlednuti do databaze je VYPNUTA - obsahuje osobni udaje
# klientu (jmena, adresy, telefony, ICO) a bez prihlaseni by k ni mel pristup
# kdokoliv v siti. Pro lokalni ladeni spust appku s profilem "dev"
# (spring.profiles.active=dev), ktery ji zapne - viz application-dev.properties.
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

server.port=8080

# Prihlasovaci ucty - appka obsahuje osobni udaje klientu, takze je cela za
# prihlasenim. Prihlasovacim identifikatorem je email (viz SecurityConfig,
# DokgenUserDetailsService). Kazdy ucet ma stejna opravneni. Dalsi ucet pridas
# zvysenim indexu: dokgen.uzivatele[2].email=..., [2].heslo=...
#
# Heslo se bere z promenne prostredi (DOKGEN_HESLO / DOKGEN_HESLO_ASISTENTKA).
# Kdyz neni nastavena, appka pri prvnim startu VYGENERUJE nahodne jednorazove
# heslo a vypise ho do logu (viz UzivateleSeeder a logging.file.name nize) -
# zadny pevny/uhodnutelny default tu umyslne neni, aby appka nikdy nebezela
# se znamym heslem.
dokgen.uzivatele[0].email=admin@dokgen.local
dokgen.uzivatele[0].heslo=${DOKGEN_HESLO:}
dokgen.uzivatele[1].email=asistentka@dokgen.local
dokgen.uzivatele[1].heslo=${DOKGEN_HESLO_ASISTENTKA:}

# Odesilani emailu s odkazem pro reset zapomenuteho hesla (viz ResetHeslaService,
# ResetHeslaController). Hodnoty jsou jen placeholdery bez realnych prihlasovacich
# udaju - appka je bere z promennych prostredi, skutecne SMTP udaje (server, port,
# uzivatel, heslo) si nastav sam pred spustenim, nikdy je nedavej primo do tohoto
# souboru. Bez nastavenych SMTP_USERNAME/SMTP_PASSWORD appka odesilani emailu
# jen zaloguje chybu - zbytek appky funguje dal normalne.
spring.mail.host=${SMTP_HOST:smtp.example.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
dokgen.mail.odesilatel=${SMTP_FROM:noreply@dokgen.local}

# Zaklad URL pro odkazy zasilane emailem (viz ResetHeslaController) - musi jit
# z konfigurace, ne z Host hlavicky prichoziho pozadavku (tu plne ovlada
# odesilatel pozadavku, takze by sla snadno podvrhnout). Pri skutecnem
# nasazeni na verejnou domenu nastav DOKGEN_ZAKLAD_URL na tu domenu.
dokgen.zaklad-url=${DOKGEN_ZAKLAD_URL:http://localhost:8080}

# Uklid starych vygenerovanych dokumentu z disku (viz GenerovaneDokumentyUklidRunner) -
# fyzicke soubory starsi nez tolik dni se smazou, audit zaznam v /historie zustava.
dokgen.vygenerovane-dokumenty.uchovat-dny=90

# Kdy behem dne se spousti denni uklid (GenerovaneDokumentyUklidRunner i
# ResetHeslaUklidRunner - oba navic bezi jednou i pri kazdem startu appky,
# bez ohledu na tohle nastaveni). Vychozi 3:00 rano - mimo pracovni dobu.
dokgen.uklid.cron=0 0 3 * * *

# Po startu appka automaticky otevre vychozi prohlizec na hlavni stranku
# (viz StartovaciProhlizecListener) - hodi se hlavne pro spusteni dvojklikem
# (.bat/.exe), pri lokalnim vyvoji pres mvnw jde vypnout pridanim
# -Ddokgen.otevrit-prohlizec-po-startu=false.
dokgen.otevrit-prohlizec-po-startu=true

# Limit velikosti nahravaneho souboru sablony (.docx) pres /sablony/nahrat
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Vynutit UTF-8 pro vsechny requesty i odpovedi. Bez tohoto Tomcat na nekterych
# systemech dekoduje telo POST formulare (napr. vyber sablony s ceskou diakritikou)
# jako ISO-8859-1, coz ticha rozbije porovnavani retezcu (napr. hledani sablony
# podle nazvu v DocumentGeneratorService).
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Log appky (vc. startovaciho hlaseni s pripadnym nahodnym heslem) se vedle
# konzole uklada i do souboru - hodi se hlavne pro spusteni pres .exe/.bat
# bez viditelneho konzoloveho okna, kde by jinak hlaseni nemel kdo videt.
logging.file.name=./data/dokgen.log

# /actuator/health - skutecny healthcheck pro monitoring (na rozdil od /zdravi,
# viz ZdraviController). Kontrola postovniho serveru je zamerne vypnuta - appka
# je navrzena fungovat i bez nastaveneho SMTP (viz komentar u spring.mail.* vyse),
# takze bez tohoto vypnuti by appka bez SMTP vzdy hlasila DOWN, i kdyz je vse v poradku.
management.health.mail.enabled=false

# Udaje dodavatele (nasi firmy) pro fakturu (viz DodavatelProperties,
# faktura.docx) - stranka /nastaveni dnes resi jen prihlasovaci email a
# zadnou obecnou perzistenci klic-hodnota nema, takze tyhle udaje zatim
# zustavaji v konfiguraci, stejne jako prihlasovaci ucty (dokgen.uzivatele[N]).
dokgen.dodavatel.nazev=Coreforge
dokgen.dodavatel.sidlo=Praha, Ceska republika
dokgen.dodavatel.ico=12345678
dokgen.dodavatel.cislo-uctu=123456789/0100

# Preklady UI (cestina/anglictina/nemcina) - viz messages*.properties a LocaleConfig.
# fallback-to-system-locale=false, aby appka na stroji s jinym systemovym jazykem
# (napr. anglicky Windows) neukazovala nahodne prohazenou cestinu/anglictinu, ale
# vzdy spolehlive defaultni jazyk appky (cestina, viz LocaleConfig.localeResolver()).
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
