<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{generovat.title}">Vygenerovat dokument</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body class="w-560" th:attr="data-stav-generuji=#{generovat.generuji},data-tlacitko-zrusit=#{spolecne.zrusit},data-tlacitko-potvrdit=#{spolecne.potvrdit}">
    <a href="#hlavni-obsah" class="skip-link" th:text="#{spolecne.preskocit}">Přeskočit na obsah</a>
    <nav>
        <a href="/" class="aktivni" th:text="#{nav.klienti}">Klienti</a>
        <a href="/sablony" th:text="#{nav.sablony}">Šablony</a>
        <a href="/historie" th:text="#{nav.historie}">Historie</a>
        <a href="/nastaveni" th:text="#{nav.nastaveni}">Nastavení</a>
        <a href="/uzivatele" th:text="#{nav.uzivatele}">Uživatelé</a>
        <form th:action="@{/logout}" method="post" style="display:inline" class="form-odhlasit" th:attr="data-potvrzeni=#{nav.odhlasit.confirm}">
            <button type="submit" class="nav-odhlasit" th:text="#{nav.odhlasit}">Odhlásit se</button>
        </form>
        <div class="jazyky">
            <a href="#" data-lang="cs" th:classappend="${#locale.language == 'cs'} ? ' aktivni-jazyk'" th:attr="aria-current=${#locale.language == 'cs'} ? 'true' : null">CS</a>
            <a href="#" data-lang="en" th:classappend="${#locale.language == 'en'} ? ' aktivni-jazyk'" th:attr="aria-current=${#locale.language == 'en'} ? 'true' : null">EN</a>
            <a href="#" data-lang="de" th:classappend="${#locale.language == 'de'} ? ' aktivni-jazyk'" th:attr="aria-current=${#locale.language == 'de'} ? 'true' : null">DE</a>
        </div>
    </nav>

    <h1 id="hlavni-obsah" th:text="#{generovat.h1} + ' ' + ${klient.jmeno} + ' ' + ${klient.prijmeni}"></h1>

    <div class="panel">
        <div class="chybovy-box" role="alert" th:if="${chybaGenerovani}" th:text="${chybaGenerovani}"></div>

        <form id="formularGenerovani" th:action="@{/generovat/{id}(id=${klient.id})}" method="post">
            <label for="sablonaId" th:text="#{generovat.vyber_sablonu}">Vyber šablonu</label>
            <select id="sablonaId" name="sablonaId">
                <option th:each="s : ${sablony}" th:value="${s.sablona.id}"
                        th:attr="data-ma-polozky=${s.maPolozky}"
                        th:text="${s.sablona.nazev} + ' ' + (${s.sablona.vestavena} ? #{generovat.vestavena} : #{generovat.vlastni})"></option>
            </select>

            <div class="label-radek">
                <label for="format" th:text="#{generovat.format}">Formát</label>
                <span class="napoveda-ikona" tabindex="0" role="img"
                      th:aria-label="#{spolecne.napoveda_prefix} + ' ' + #{generovat.format.napoveda}"
                      th:attr="data-tip=#{generovat.format.napoveda}">💡</span>
            </div>
            <select id="format" name="format">
                <option value="WORD" th:text="#{generovat.format.word}">Word (.docx)</option>
                <option value="PDF" th:text="#{generovat.format.pdf}">PDF</option>
            </select>

            <fieldset id="sekcePolozky" hidden disabled th:object="${formular}">
                <legend th:text="#{generovat.faktura.nadpis}">Údaje faktury</legend>

                <label for="cisloFaktury" th:text="#{generovat.faktura.cislo}">Číslo faktury</label>
                <input type="text" th:field="*{cisloFaktury}" maxlength="50" />

                <label for="splatnostDny" th:text="#{generovat.faktura.splatnost}">Splatnost ve dnech</label>
                <input type="number" th:field="*{splatnostDny}" min="0" step="1" />

                <table id="tabulkaPolozek">
                    <thead>
                        <tr>
                            <th th:text="#{generovat.faktura.nazev}">Název</th>
                            <th th:text="#{generovat.faktura.mnozstvi}">Množství</th>
                            <th th:text="#{generovat.faktura.cena}">Cena za jednotku</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="teloTabulkyPolozek"></tbody>
                </table>
                <button type="button" id="tlacitkoPridatRadek" th:text="#{generovat.faktura.pridat_radek}">+ Přidat řádek</button>
            </fieldset>

            <div class="akce">
                <button type="submit" th:text="#{generovat.generovat_stahnout}">Vygenerovat a stáhnout</button>
                <button type="button" id="tlacitkoNahled" th:text="#{generovat.nahled}">Náhled</button>
                <a class="zpet" href="/" th:text="#{generovat.zpet}">Zpět na seznam</a>
                <span class="stav-odeslani" aria-live="polite"></span>
            </div>
        </form>
    </div>

    <template id="sablonaRadkuPolozky">
        <tr class="radek-polozky">
            <td><input type="text" class="pole-nazev" maxlength="200" /></td>
            <td><input type="number" class="pole-mnozstvi" min="0" step="0.01" /></td>
            <td><input type="number" class="pole-cena" min="0" step="0.01" /></td>
            <td><button type="button" class="tlacitko-odebrat-radek" th:text="#{generovat.faktura.odebrat_radek}">Odebrat</button></td>
        </tr>
    </template>

    <script th:inline="javascript">
        var urlNahledu = /*[[@{/generovat/{id}/nahled(id=${klient.id})}]]*/ '';

        document.getElementById('formularGenerovani').addEventListener('submit', function (event) {
            var tlacitko = event.target.querySelector('button[type=submit]');
            var stav = event.target.querySelector('.stav-odeslani');
            tlacitko.disabled = true;
            stav.textContent = document.body.getAttribute('data-stav-generuji');
            // stazeni neopousti stranku, tak tlacitko po chvili zase povolime
            setTimeout(function () { tlacitko.disabled = false; stav.textContent = ''; }, 2000);
        });

        document.getElementById('tlacitkoNahled').addEventListener('click', function () {
            var sablonaId = document.getElementById('sablonaId').value;
            window.open(urlNahledu + '?sablonaId=' + encodeURIComponent(sablonaId), '_blank');
        });
    </script>

    <button type="button" class="napoveda-tlacitko" aria-expanded="false" aria-controls="napoveda-panel" th:aria-label="#{spolecne.napoveda.label}">?</button>
    <div id="napoveda-panel" class="napoveda-panel" hidden>
        <h3 th:text="#{spolecne.napoveda.nadpis}">Jak to tady funguje</h3>
        <p th:text="#{generovat.napoveda.text}">Vyber šablonu a formát (Word nebo PDF) a appka rovnou vygeneruje a stáhne dokument s údaji tohoto klienta doplněnými do šablony.</p>
        <button type="button" class="zavrit" th:text="#{spolecne.zavrit}">Zavřít</button>
    </div>
    <script th:src="@{/napoveda.js}"></script>
    <script th:src="@{/jazyky.js}"></script>
    <script th:src="@{/potvrzeni.js}"></script>
    <script th:src="@{/generovat.js}"></script>
</body>
</html>
