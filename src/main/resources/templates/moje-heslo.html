<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="cs">
<head>
    <meta charset="UTF-8">
    <title th:text="#{moje-heslo.title}">Změnit heslo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body class="w-560" th:attr="data-tlacitko-zrusit=#{spolecne.zrusit},data-tlacitko-potvrdit=#{spolecne.potvrdit}">
    <a href="#hlavni-obsah" class="skip-link" th:text="#{spolecne.preskocit}">Přeskočit na obsah</a>
    <nav>
        <a href="/" th:text="#{nav.klienti}">Klienti</a>
        <a href="/sablony" th:text="#{nav.sablony}">Šablony</a>
        <a href="/historie" th:text="#{nav.historie}">Historie</a>
        <a href="/nastaveni" th:text="#{nav.nastaveni}">Nastavení</a>
        <form th:action="@{/logout}" method="post" style="display:inline" class="form-odhlasit" th:attr="data-potvrzeni=#{nav.odhlasit.confirm}">
            <button type="submit" class="nav-odhlasit" th:text="#{nav.odhlasit}">Odhlásit se</button>
        </form>
        <div class="jazyky">
            <a href="#" data-lang="cs" th:classappend="${#locale.language == 'cs'} ? ' aktivni-jazyk'">CS</a>
            <a href="#" data-lang="en" th:classappend="${#locale.language == 'en'} ? ' aktivni-jazyk'">EN</a>
            <a href="#" data-lang="de" th:classappend="${#locale.language == 'de'} ? ' aktivni-jazyk'">DE</a>
        </div>
    </nav>

    <h1 id="hlavni-obsah" th:text="#{moje-heslo.h1}">Změnit heslo</h1>

    <div class="panel">
        <div class="chybovy-box" id="moje-heslo-chyba" role="alert" th:if="${chyba}" th:text="${chyba}"></div>
        <div class="info-box" role="status" th:if="${uspech}" th:text="#{moje-heslo.uspech}"></div>

        <form method="post" th:action="@{/moje-heslo}">
            <label for="soucasneHeslo" th:text="#{pole.soucasne_heslo}">Současné heslo</label>
            <input type="password" id="soucasneHeslo" name="soucasneHeslo" autocomplete="current-password" required
                   th:aria-invalid="${chyba != null}"
                   th:aria-describedby="${chyba} ? 'moje-heslo-chyba' : null" />

            <label for="noveHeslo" th:text="#{pole.nove_heslo}">Nové heslo</label>
            <input type="password" id="noveHeslo" name="noveHeslo" autocomplete="new-password" required minlength="8"
                   th:aria-invalid="${chyba != null}"
                   th:aria-describedby="${chyba} ? 'moje-heslo-chyba' : null" />

            <label for="noveHesloZnovu" th:text="#{moje-heslo.nove_heslo_znovu}">Nové heslo znovu</label>
            <input type="password" id="noveHesloZnovu" name="noveHesloZnovu" autocomplete="new-password" required minlength="8"
                   th:aria-invalid="${chyba != null}"
                   th:aria-describedby="${chyba} ? 'moje-heslo-chyba' : null" />

            <div class="akce">
                <button type="submit" th:text="#{moje-heslo.zmenit}">Změnit heslo</button>
            </div>
        </form>
    </div>

    <script th:src="@{/jazyky.js}"></script>
    <script th:src="@{/potvrzeni.js}"></script>
</body>
</html>
