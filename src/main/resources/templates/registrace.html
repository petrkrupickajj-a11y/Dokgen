<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="cs">
<head>
    <meta charset="UTF-8">
    <title th:text="#{registrace.title}">Nový účet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body class="auth">
    <div class="jazyky plovouci">
        <a href="#" data-lang="cs" th:classappend="${#locale.language == 'cs'} ? ' aktivni-jazyk'">CS</a>
        <a href="#" data-lang="en" th:classappend="${#locale.language == 'en'} ? ' aktivni-jazyk'">EN</a>
        <a href="#" data-lang="de" th:classappend="${#locale.language == 'de'} ? ' aktivni-jazyk'">DE</a>
    </div>

    <h1 th:text="#{registrace.h1}">Přidat nový uživatelský účet</h1>

    <div class="panel">
        <div class="chybovy-box" id="registrace-chyba" role="alert" th:if="${chyba}" th:text="${chyba}"></div>
        <div class="info-box" role="status" th:if="${uspech}" th:text="#{registrace.uspech(${uspech})}"></div>

        <form method="post" th:action="@{/registrace}">
            <label for="jmeno" th:text="#{pole.uzivatelske_jmeno}">Uživatelské jméno</label>
            <input type="text" id="jmeno" name="jmeno" th:value="${zadaneJmeno}" autocomplete="username" autofocus required
                   th:aria-invalid="${chyba != null}"
                   th:aria-describedby="${chyba} ? 'registrace-chyba' : null" />

            <label for="heslo" th:text="#{pole.heslo}">Heslo</label>
            <input type="password" id="heslo" name="heslo" autocomplete="new-password" required minlength="6"
                   th:aria-invalid="${chyba != null}"
                   th:aria-describedby="${chyba} ? 'registrace-chyba' : null" />

            <label for="hesloZnovu" th:text="#{registrace.heslo_znovu}">Heslo znovu</label>
            <input type="password" id="hesloZnovu" name="hesloZnovu" autocomplete="new-password" required minlength="6"
                   th:aria-invalid="${chyba != null}"
                   th:aria-describedby="${chyba} ? 'registrace-chyba' : null" />

            <label for="role" th:text="#{registrace.role}">Role nového účtu</label>
            <select id="role" name="role">
                <option value="ASISTENTKA" th:selected="${zadanaRole == null || zadanaRole == 'ASISTENTKA'}" th:text="#{registrace.role.asistentka}">Asistentka - vytváří klienty, generuje dokumenty</option>
                <option value="ADMIN" th:selected="${zadanaRole == 'ADMIN'}" th:text="#{registrace.role.admin}">Admin - navíc správa šablon a účtů</option>
            </select>

            <div class="akce">
                <button type="submit" th:text="#{registrace.vytvorit}">Vytvořit účet</button>
            </div>
        </form>

        <a class="zpet zpet-stred" href="/" th:text="#{registrace.zpet}">Zpět na klienty</a>
    </div>
    <script th:src="@{/jazyky.js}"></script>
</body>
</html>
