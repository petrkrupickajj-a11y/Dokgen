<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="cs">
<head>
    <meta charset="UTF-8">
    <title th:text="#{login.title}">Přihlášení</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body class="auth">
    <div class="jazyky plovouci">
        <a href="#" data-lang="cs" th:classappend="${#locale.language == 'cs'} ? ' aktivni-jazyk'">CS</a>
        <a href="#" data-lang="en" th:classappend="${#locale.language == 'en'} ? ' aktivni-jazyk'">EN</a>
        <a href="#" data-lang="de" th:classappend="${#locale.language == 'de'} ? ' aktivni-jazyk'">DE</a>
    </div>

    <h1 th:text="#{login.h1}">Přihlášení do Generátoru dokumentů</h1>

    <div class="panel">
        <div class="chybovy-box" id="login-chyba" role="alert" th:if="${param.error}" th:text="#{login.chyba}">Neplatné uživatelské jméno nebo heslo.</div>
        <div class="info-box" role="status" th:if="${param.odhlaseno}" th:text="#{login.odhlaseno}">Byl jsi úspěšně odhlášen.</div>
        <div class="info-box" role="status" th:if="${param.jmenoZmeneno}" th:text="#{login.jmeno_zmeneno}">Uživatelské jméno bylo změněno. Přihlas se prosím znovu.</div>

        <form method="post" th:action="@{/login}">
            <label for="username" th:text="#{pole.uzivatelske_jmeno}">Uživatelské jméno</label>
            <input type="text" id="username" name="username" autocomplete="username" autofocus required
                   th:aria-invalid="${maChybu}"
                   th:aria-describedby="${maChybu} ? 'login-chyba' : null" />

            <label for="password" th:text="#{pole.heslo}">Heslo</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required
                   th:aria-invalid="${maChybu}"
                   th:aria-describedby="${maChybu} ? 'login-chyba' : null" />

            <div class="akce">
                <button type="submit" th:text="#{login.prihlasit}">Přihlásit se</button>
            </div>
        </form>
    </div>
    <script th:src="@{/jazyky.js}"></script>
</body>
</html>
