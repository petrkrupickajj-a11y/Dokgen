<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="cs">
<head>
    <meta charset="UTF-8">
    <title th:text="#{nastaveni.title}">Nastavení</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body class="w-560" th:attr="data-tlacitko-zrusit=#{spolecne.zrusit},data-tlacitko-potvrdit=#{spolecne.potvrdit}">
    <a href="#hlavni-obsah" class="skip-link" th:text="#{spolecne.preskocit}">Přeskočit na obsah</a>
    <nav>
        <a href="/" th:text="#{nav.klienti}">Klienti</a>
        <a href="/sablony" th:if="${jeAdmin}" th:text="#{nav.sablony}">Šablony</a>
        <a href="/historie" th:text="#{nav.historie}">Historie</a>
        <a href="/nastaveni" class="aktivni" th:text="#{nav.nastaveni}">Nastavení</a>
        <form th:action="@{/logout}" method="post" style="display:inline" class="form-odhlasit" th:attr="data-potvrzeni=#{nav.odhlasit.confirm}">
            <button type="submit" class="nav-odhlasit" th:text="#{nav.odhlasit}">Odhlásit se</button>
        </form>
        <div class="jazyky">
            <a href="#" data-lang="cs" th:classappend="${#locale.language == 'cs'} ? ' aktivni-jazyk'">CS</a>
            <a href="#" data-lang="en" th:classappend="${#locale.language == 'en'} ? ' aktivni-jazyk'">EN</a>
            <a href="#" data-lang="de" th:classappend="${#locale.language == 'de'} ? ' aktivni-jazyk'">DE</a>
        </div>
    </nav>

    <h1 id="hlavni-obsah" th:text="#{nastaveni.h1}">Nastavení</h1>
    <p class="podnadpis" th:text="#{nastaveni.aktualni_jmeno(${aktualniJmeno})}">Aktuální uživatelské jméno: admin</p>

    <div class="panel">
        <h2 th:text="#{nastaveni.jmeno.nadpis}">Uživatelské jméno</h2>
        <div class="chybovy-box" id="nastaveni-chyba" role="alert" th:if="${chyba}" th:text="${chyba}"></div>

        <form method="post" th:action="@{/nastaveni/jmeno}">
            <label for="soucasneHeslo" th:text="#{pole.soucasne_heslo}">Současné heslo</label>
            <input type="password" id="soucasneHeslo" name="soucasneHeslo" autocomplete="current-password" required
                   th:aria-invalid="${chyba != null}"
                   th:aria-describedby="${chyba} ? 'nastaveni-chyba' : null" />

            <label for="noveJmeno" th:text="#{pole.nove_uzivatelske_jmeno}">Nové uživatelské jméno</label>
            <input type="text" id="noveJmeno" name="noveJmeno" autocomplete="username" required
                   th:value="${aktualniJmeno}"
                   th:aria-invalid="${chyba != null}"
                   th:aria-describedby="${chyba} ? 'nastaveni-chyba' : null" />
            <p th:text="#{nastaveni.jmeno.napoveda}">Po změně jména se budeš muset znovu přihlásit.</p>

            <div class="akce">
                <button type="submit" th:text="#{nastaveni.jmeno.zmenit}">Změnit jméno</button>
            </div>
        </form>
    </div>

    <div class="panel">
        <h2 th:text="#{nastaveni.heslo.nadpis}">Heslo</h2>
        <a class="button" href="/moje-heslo" th:text="#{nastaveni.heslo.odkaz}">Změnit heslo</a>
    </div>

    <div class="panel" th:if="${jeAdmin}">
        <h2 th:text="#{nastaveni.ucet.nadpis}">Účty</h2>
        <a class="button" href="/registrace" th:text="#{nastaveni.ucet.odkaz}">Založit nový účet</a>
    </div>

    <script th:src="@{/jazyky.js}"></script>
    <script th:src="@{/potvrzeni.js}"></script>
</body>
</html>
