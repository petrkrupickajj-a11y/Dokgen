<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{zapomenute-heslo.title}">Zapomenuté heslo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body class="auth">
    <div class="jazyky plovouci">
        <a href="#" data-lang="cs" th:classappend="${#locale.language == 'cs'} ? ' aktivni-jazyk'" th:attr="aria-current=${#locale.language == 'cs'} ? 'true' : null">CS</a>
        <a href="#" data-lang="en" th:classappend="${#locale.language == 'en'} ? ' aktivni-jazyk'" th:attr="aria-current=${#locale.language == 'en'} ? 'true' : null">EN</a>
        <a href="#" data-lang="de" th:classappend="${#locale.language == 'de'} ? ' aktivni-jazyk'" th:attr="aria-current=${#locale.language == 'de'} ? 'true' : null">DE</a>
    </div>

    <h1 th:text="#{zapomenute-heslo.h1}">Zapomenuté heslo</h1>

    <div class="panel">
        <div class="chybovy-box" role="alert" th:if="${chyba}" th:text="${chyba}"></div>
        <div class="info-box" role="status" th:if="${odeslano}" th:text="#{zapomenute-heslo.odeslano}">Pokud tenhle email existuje, poslali jsme na něj odkaz pro nastavení nového hesla.</div>

        <p th:unless="${odeslano} or ${chyba}" th:text="#{zapomenute-heslo.podnadpis}">Zadej email, na který ti pošleme odkaz pro nastavení nového hesla.</p>

        <form method="post" th:action="@{/zapomenute-heslo}">
            <label for="email" th:text="#{pole.email}">Email</label>
            <input type="email" id="email" name="email" autocomplete="username" autofocus required />

            <div class="akce">
                <button type="submit" th:text="#{zapomenute-heslo.odeslat}">Odeslat odkaz</button>
            </div>
        </form>

        <a class="zpet zpet-stred" href="/login" th:text="#{registrace.zpet}">Zpět na přihlášení</a>
    </div>
    <script th:src="@{/jazyky.js}"></script>
</body>
</html>
